<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none">
  <!-- Brush wand -->
  <line x1="48" y1="8" x2="48" y2="20" stroke="#9B6B73" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cap -->
  <rect x="37" y="20" width="22" height="16" rx="5" stroke="#9B6B73" stroke-width="2.5" fill="rgba(185,138,132,0.22)"/>
  <!-- Slim neck -->
  <rect x="43" y="36" width="10" height="6" stroke="#9B6B73" stroke-width="2.5" fill="rgba(185,138,132,0.15)"/>
  <!-- Bottle body -->
  <rect x="30" y="42" width="36" height="40" rx="10" stroke="#9B6B73" stroke-width="2.5" fill="rgba(185,138,132,0.12)"/>
  <!-- Polish color visible at top of body -->
  <path d="M 32,54 C 32,49 34,44 38,43 L 58,43 C 62,44 64,49 64,54 Z" fill="rgba(155,107,115,0.22)"/>
  <!-- Shine line -->
  <path d="M 37,52 Q 36,60 38,72" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
