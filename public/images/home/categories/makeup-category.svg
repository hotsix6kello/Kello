<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none">
  <!-- Lipstick bullet (classic angled cut) -->
  <path d="M 38,46 L 38,26 L 48,16 L 58,28 L 58,46 Z"
        stroke="#B98A84" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="rgba(185,138,132,0.28)"/>
  <!-- Shine on bullet -->
  <line x1="43" y1="20" x2="43" y2="44" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Sleeve / collar -->
  <rect x="34" y="46" width="28" height="10" rx="3" stroke="#B98A84" stroke-width="2.5" fill="rgba(185,138,132,0.22)"/>
  <!-- Tube body -->
  <rect x="36" y="56" width="24" height="28" rx="6" stroke="#B98A84" stroke-width="2.5" fill="rgba(185,138,132,0.12)"/>
  <!-- Sparkle cross top-right -->
  <line x1="72" y1="22" x2="72" y2="16" stroke="rgba(185,138,132,0.65)" stroke-width="2" stroke-linecap="round"/>
  <line x1="69" y1="19" x2="75" y2="19" stroke="rgba(185,138,132,0.65)" stroke-width="2" stroke-linecap="round"/>
  <!-- Smaller sparkle -->
  <line x1="80" y1="34" x2="80" y2="30" stroke="rgba(185,138,132,0.45)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="78" y1="32" x2="82" y2="32" stroke="rgba(185,138,132,0.45)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Dot accent -->
  <circle cx="68" cy="13" r="2" fill="rgba(185,138,132,0.5)"/>
</svg>
