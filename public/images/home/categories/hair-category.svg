<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none">
  <!-- Blade + arm 1: upper-left tip → pivot → left handle -->
  <path d="M 18,14 L 48,44 C 46,54 36,66 22,80" stroke="#8A5F5A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Blade + arm 2: upper-right tip → pivot → right handle -->
  <path d="M 78,14 L 48,44 C 50,54 60,66 74,80" stroke="#8A5F5A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Pivot screw -->
  <circle cx="48" cy="44" r="3.5" stroke="#8A5F5A" stroke-width="2" fill="rgba(185,138,132,0.3)"/>
  <!-- Left handle ring -->
  <circle cx="22" cy="80" r="8" stroke="#8A5F5A" stroke-width="2.5" fill="rgba(185,138,132,0.1)"/>
  <!-- Right handle ring -->
  <circle cx="74" cy="80" r="8" stroke="#8A5F5A" stroke-width="2.5" fill="rgba(185,138,132,0.1)"/>
</svg>
